# Netlify configuration for masurii.dev
# This is a static Astro site — no serverless functions needed.

[build]
  command = "npm run build"
  publish = "dist"

# Production context
[context.production]
  command = "npm run build"

# Deploy preview context (PR previews)
[context.deploy-preview]
  command = "npm run build"

# Branch deploys (staging)
[context.branch-deploy]
  command = "npm run build"

# Static asset caching — long-lived cache for hashed Astro assets
# Fonts get 1 year (they're versioned by fontsource)
# SVG/favicon get 1 year
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/og-default.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Sitemap — short cache, always fresh for crawlers
[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-0.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# robots.txt — short cache for crawl discovery
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Security headers for all pages
# These apply to every HTML page Netlify serves.
# CSP allows self, fonts from fontsource CDN (inline styles for theme),
# and the GitHub/GitHubusercontent domains for project data.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """\
      default-src 'self'; \
      script-src 'self' 'unsafe-inline'; \
      style-src 'self' 'unsafe-inline'; \
      img-src 'self' data: https://github.com https://raw.githubusercontent.com; \
      font-src 'self'; \
      connect-src 'self'; \
      frame-ancestors 'none'; \
      base-uri 'self'; \
      form-action 'self';\
      """