<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0C0C0C"/>
  <rect x="2" y="2" width="60" height="60" rx="10" fill="none" stroke="#27272A" stroke-width="1"/>
  <!-- Terminal title bar dots -->
  <circle cx="14" cy="12" r="2.5" fill="#FF6B4A"/>
  <circle cx="22" cy="12" r="2.5" fill="#FACC15"/>
  <circle cx="30" cy="12" r="2.5" fill="#4ADE80"/>
  <!-- Terminal separator -->
  <line x1="4" y1="18" x2="60" y2="18" stroke="#27272A" stroke-width="0.75"/>
  <!-- Prompt symbol $ -->
  <text x="10" y="36" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-weight="700" font-size="18" fill="#FF6B4A">$</text>
  <!-- Cursor block -->
  <rect x="28" y="26" width="12" height="16" rx="1.5" fill="#FF6B4A" opacity="0.85"/>
  <!-- "m" initial inside cursor -->
  <text x="30" y="39" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-weight="700" font-size="14" fill="#FFFFFF">m</text>
  <!-- Path hint at bottom -->
  <text x="10" y="52" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="8" fill="#52525B">~masurii</text>
</svg>